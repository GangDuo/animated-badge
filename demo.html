<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
animated-badge[type="cross"] {
  --check-color: #f44336;
}
        </style>
    </head>
    <body>
        <animated-badge></animated-badge>
        <animated-badge type="cross"></animated-badge>
        <animated-badge type="minus"></animated-badge>
        <input type="button" value="show" class="btn"/>
        <input type="button" value="clear" class="clr"/>

<script src="./dist/animated-badge.js"></script>
<script>
document.querySelector('.clr').addEventListener('click', () => {
  document.querySelectorAll('animated-badge').forEach(el => el.reset());
});

document.querySelector('.btn').addEventListener('click', () => {
  document.querySelectorAll('animated-badge').forEach(el => el.play());
});

</script>
    </body>
</html>
